apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mongo-vault-secret
  namespace: default
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend-store
    kind: ClusterSecretStore
  target:
    name: mongodb-secret
    creationPolicy: Owner
  data:
    - secretKey: mongo-root-username
      remoteRef:
        key: secret/data/mongodb
        property: MONGO_USER
    - secretKey: mongo-root-password
      remoteRef:
        key: secret/data/mongodb
        property: MONGO_PASS
