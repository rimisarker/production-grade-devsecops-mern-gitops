apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-backend
  labels:
    app: mern-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mern-backend
  template:
    metadata:
      labels:
        app: mern-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Waiting for MongoDB..."; until nc -z -w 2 mongodb 27017; do sleep 2; done; echo "MongoDB is up!"']
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000 
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
      containers:
      - name: backend-app
        image: rimisarker/mern-backend:prod-4
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false 
          capabilities:
            drop:
            - ALL
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-uri
        - name: PORT
          value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: mern-backend-service
  labels:
    app: mern-backend
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  selector:
    app: mern-backend