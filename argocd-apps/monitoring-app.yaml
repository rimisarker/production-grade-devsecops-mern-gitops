apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.2.2
    helm:
      values: |
        # Enable Prometheus persistence or configuration if needed
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            # cAdvisor and Node Exporter are enabled by default inside kube-prometheus-stack
            enableAdminAPI: true

        # Grafana configuration
        grafana:
          enabled: true
          adminPassword: "admin" # Change this securely for production

        # Node Exporter configuration for host-level metrics
        nodeExporter:
          enabled: true

        # kube-state-metrics for Kubernetes object metrics
        kubeStateMetrics:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
