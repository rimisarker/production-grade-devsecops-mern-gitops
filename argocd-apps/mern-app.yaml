apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-stack-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rimisarker/production-grade-devsecops-mern-gitops.git
    targetRevision: HEAD
    path: k8s-manifests # k8s file path
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
